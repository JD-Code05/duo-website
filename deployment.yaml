apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-deployment-hidalgo-ubungen
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web-site
  template:
    metadata:
      labels:
        app: web-site
    spec:
      containers:
      - name: web-container
        image: mt-05-hidalgo-ubungen:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
